<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="referrer" content="no-referrer">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Waifu Viewer</title>
  <style>
    html, body {
      background: #121212;
      color: #e0e0e0;
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    /* The gallery is the full viewport. Every tile inside it is absolutely
       positioned by app.js using px coordinates computed from a recursive
       (BSP) split of the viewport, so there's never any leftover gap and
       never any scroll. */
    #gallery {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }
    #gallery .tile {
      display: block;
      overflow: hidden;
      box-sizing: border-box;
    }
    #gallery .tile img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover; /* default; app.js overrides to "contain" per-tile when cropping would be too severe */
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    #gallery .tile img.loaded {
      opacity: 1;
    }
    #gallery .tile.failed img {
      display: none;
    }
  </style>
</head>
<body>

  <div id="gallery"></div>
  <script src="image.js"></script>
  <script src="app.js"></script>
  <script src="zoom.js"></script>

</body>
</html>
